query getCallsMinimal(
  $filter: CallsFilter
  $sortField: String
  $sortDirection: PaginationSortDirection
) {
  calls(filter: $filter, sortField: $sortField, sortDirection: $sortDirection) {
    id
    shortCode
    startCall
    endCall
    endCallInternal
    title
    templateId
    description
    cycleComment
    allocationTimeUnit
    isActive
    sort_order
  }
}
