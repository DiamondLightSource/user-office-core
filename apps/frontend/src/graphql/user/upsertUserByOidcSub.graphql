mutation upsertUserByOidcSub(
  $userTitle: String
  $firstName: String!
  $lastName: String!
  $preferredName: String
  $oidcSub: String!
  $institution: InstitutionInput!
  $email: String!
) {
  upsertUserByOidcSub(
    userTitle: $userTitle
    firstName: $firstName
    lastName: $lastName
    preferredName: $preferredName
    oidcSub: $oidcSub
    institution: $institution
    email: $email
  ) {
    id
  }
}
