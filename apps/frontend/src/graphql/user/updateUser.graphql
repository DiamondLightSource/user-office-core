mutation updateUser(
  $id: Int!
  $userTitle: String
  $firstname: String
  $lastname: String
  $preferredname: String
  $institutionId: Int
  $email: String
) {
  updateUser(
    id: $id
    userTitle: $userTitle
    firstname: $firstname
    lastname: $lastname
    preferredname: $preferredname
    institutionId: $institutionId
    email: $email
  ) {
    id
  }
}
